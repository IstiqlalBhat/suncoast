name: field_flow
description: "FieldFlow - Voice-First Mobile AI Agent for Field Workers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Backend
  supabase_flutter: ^2.8.3
  firebase_core: ^3.12.1
  cloud_functions: ^5.4.3

  # Network
  dio: ^5.7.0
  http: ^1.2.2
  web_socket_channel: ^3.0.2

  # Auth & Security
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

  # Audio
  record: ^6.2.0
  flutter_tts: ^4.2.0
  just_audio: ^0.9.43
  audio_session: ^0.1.21

  # Media
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  file_picker: ^8.1.7

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  permission_handler: ^11.3.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.2
  logger: ^2.5.0
  shared_preferences: ^2.3.5
  share_plus: ^12.0.1
  pdf: ^3.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.1.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  mocktail: ^1.0.4
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/
